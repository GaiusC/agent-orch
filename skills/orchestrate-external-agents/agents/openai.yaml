interface:
  display_name: "External Agent Orchestrator"
  short_description: "Delegate code to CC and AGY safely"
  default_prompt: "Use $orchestrate-external-agents to plan this project, delegate implementation to CC, and verify the result."

dependencies:
  tools:
    - type: "mcp"
      value: "external_agents"
      description: "Local CC and AGY worker broker"
      transport: "stdio"

policy:
  allow_implicit_invocation: true
